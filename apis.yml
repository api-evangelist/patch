aid: patch
name: Patch
description: >
  Patch is a carbon removal and offsetting REST API platform that enables businesses
  to programmatically purchase high-quality carbon credits and integrate sustainability
  directly into their products and services. The API provides access to a curated
  marketplace of vetted carbon removal projects including reforestation, direct air
  capture, enhanced weathering, and other negative emissions technologies. Developers
  can embed carbon removal at the order level, calculating emissions estimates and
  placing orders ranging from a single gram to thousands of tonnes of CO2 equivalent.
  Patch combines an API-first approach with deep carbon market expertise, diligence,
  and portfolio management tools to help organizations meet science-based net-zero
  targets with integrity and transparency.
